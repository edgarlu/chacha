<meta name="theme-color" content="#0e0f13">
<title>语音助手</title>
<style>
  :root {
    --bg: #0e0f13; --fg: #e8e8ea; --dim: #8a8b92;
    --accent: #4f8cff; --green: #2ecc71; --red: #e74c3c; --x: #1d9bf0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, "PingFang SC", sans-serif;
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overflow: hidden;
  }
  header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
  header h1 { font-size: 17px; font-weight: 600; }
  .htools { display: flex; gap: 10px; align-items: center; }
  #xtoggle {
    font-size: 13px; font-weight: 600; padding: 5px 12px; border-radius: 14px;
    border: 1px solid #2a2d38; background: #15171e; color: var(--dim); cursor: pointer;
  }
  #xtoggle.on { color: #fff; background: var(--x); border-color: var(--x); }
  #gear { font-size: 22px; background: none; border: none; color: var(--dim); cursor: pointer; }

  #log { flex: 1; overflow-y: auto; padding: 0 16px 12px; -webkit-overflow-scrolling: touch; }
  .msg { margin: 8px 0; max-width: 86%; padding: 10px 14px; border-radius: 16px; line-height: 1.45; font-size: 16px; white-space: pre-wrap; word-break: break-word; }
  .user { background: var(--accent); color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
  .ai { background: #1d1f27; border-bottom-left-radius: 4px; }
  .ai.x { background: #0e2535; border: 1px solid #16415e; }
  .sys { color: var(--dim); font-size: 13px; text-align: center; background: none; max-width: 100%; padding: 4px; }

  #controls { padding: 10px 16px calc(16px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #status { font-size: 14px; color: var(--dim); height: 20px; }
  #vu { width: 120px; height: 4px; border-radius: 2px; background: #23252e; overflow: hidden; }
  #vufill { height: 100%; width: 0%; background: var(--green); transition: width 60ms linear; }

  #bigbtn {
    width: 92px; height: 92px; border-radius: 50%; border: none; font-size: 38px; cursor: pointer;
    background: var(--accent); color: #fff; transition: background .2s;
  }
  #bigbtn.live { background: var(--red); animation: pulse 1.6s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(231,76,60,.45); }
    70% { box-shadow: 0 0 0 22px rgba(231,76,60,0); }
    100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
  }
  #textrow { display: flex; gap: 8px; width: 100%; max-width: 520px; }
  #textin { flex: 1; padding: 11px 14px; border-radius: 22px; border: 1px solid #2a2d38; background: #15171e; color: var(--fg); font-size: 16px; outline: none; }
  #sendbtn { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--accent); color: #fff; font-size: 20px; cursor: pointer; flex-shrink: 0; }

  #panel { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: flex-end; z-index: 10; }
  #panel.show { display: flex; }
  #panel .sheet { background: #15171e; width: 100%; border-radius: 18px 18px 0 0; padding: 22px 20px calc(28px + env(safe-area-inset-bottom)); max-height: 88%; overflow-y: auto; }
  .sheet h2 { font-size: 17px; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--dim); margin-bottom: 6px; }
  .field input, .field select { width: 100%; padding: 11px 12px; border-radius: 10px; border: 1px solid #2a2d38; background: #0e0f13; color: var(--fg); font-size: 15px; }
  .sheet button.save { width: 100%; padding: 13px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-size: 16px; font-weight: 600; margin-top: 6px; cursor: pointer; }
  .hint { font-size: 12px; color: var(--dim); margin-top: 4px; }
  .sec { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; margin: 18px 0 8px; }
  .switch { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
  .switch span { font-size: 15px; }
  .toggle { position: relative; width: 50px; height: 30px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: #2a2d38; border-radius: 30px; transition: .2s; }
  .slider::before { content: ''; position: absolute; height: 24px; width: 24px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  .toggle input:checked + .slider { background: var(--x); }
  .toggle input:checked + .slider::before { transform: translateX(20px); }
</style>
</head>
<body>
<header>
  <h1>语音助手</h1>
  <div class="htools">
    <button id="xtoggle">＋X 关</button>
    <button id="gear">⚙︎</button>
  </div>
</header>

<div id="log"></div>

<div id="controls">
  <div id="status">点击开始对话</div>
  <div id="vu"><div id="vufill"></div></div>
  <button id="bigbtn">🎙</button>
  <div id="textrow">
    <input id="textin" type="text" placeholder="也可以打字提问…" autocomplete="off">
    <button id="sendbtn">↑</button>
  </div>
</div>

<div id="panel">
  <div class="sheet">
    <h2>设置</h2>
    <div class="sec">必填</div>
    <div class="field">
      <label>Gemini API Key（回答 + 联网搜索 + 发声）</label>
      <input id="set-gemkey" type="password" placeholder="AIza...">
      <p class="hint">aistudio.google.com 免费生成，无需绑卡</p>
    </div>
    <div class="field">
      <label>Groq API Key（语音转文字）</label>
      <input id="set-gkey" type="password" placeholder="gsk_...">
    </div>
    <div class="sec">X（推特）补充</div>
    <div class="field">
      <label>xAI API Key</label>
      <input id="set-xaikey" type="password" placeholder="xai-...">
      <p class="hint">Gemini 答完后，用 Grok 追加一段 X(推特) 上的实时讨论</p>
    </div>
    <div class="switch">
      <span>启用 X 推特补充</span>
      <label class="toggle"><input id="set-xaion" type="checkbox"><span class="slider"></span></label>
    </div>
    <div class="sec">偏好</div>
    <div class="field">
      <label>朗读引擎</label>
      <select id="set-tts">
        <option value="gemini">Gemini 语音（音色好，有网络延迟）</option>
        <option value="local">iPhone 本地语音（零延迟更顺，朗读时只能点屏幕打断）</option>
      </select>
    </div>
    <div class="field" id="voicefield">
      <label>Gemini 声音</label>
      <select id="set-voice">
        <option value="Kore">Kore（沉稳女声）</option>
        <option value="Aoede">Aoede（轻快女声）</option>
        <option value="Leda">Leda（年轻女声）</option>
        <option value="Puck">Puck（活泼男声）</option>
        <option value="Charon">Charon（低沉男声）</option>
        <option value="Zephyr">Zephyr（明亮中性）</option>
      </select>
    </div>
    <div class="field">
      <label>朗读分段长度</label>
      <select id="set-chunk">
        <option value="18">短（出声快，但偏碎）</option>
        <option value="30">中（推荐）</option>
        <option value="48">长（最顺滑，首句稍慢）</option>
      </select>
    </div>
    <div class="field">
      <label>语速（0.8 ～ 1.3）</label>
      <input id="set-rate" type="number" step="0.05" min="0.8" max="1.3" value="1.0">
    </div>
    <div class="field">
      <label>静音判定（秒，说完停顿多久算结束）</label>
      <input id="set-silence" type="number" step="0.1" min="0.5" max="3" value="1.0">
    </div>
    <button class="save" id="save">保存</button>
    <button class="save" id="test" style="background:#2a2d38;margin-top:10px">测试连接</button>
    <p id="testout" class="hint" style="white-space:pre-wrap"></p>
    <div class="sec">对话记录（本地保存，最多 100 条）</div>
    <button class="save" id="viewmem" style="background:#2a2d38">查看全部记录 <span id="memcount"></span></button>
    <div id="memlist" style="display:none;margin-top:10px;max-height:240px;overflow-y:auto;font-size:13px;line-height:1.5;border:1px solid #2a2d38;border-radius:10px;padding:10px"></div>
    <button class="save" id="clearmem" style="background:#3a1f1f;color:#ff9b9b;margin-top:10px">清空对话记录</button>
    <p class="hint">所有 Key 和对话记录只保存在本机浏览器，不会上传到任何服务器。</p>
  </div>
</div>

<script>
'use strict';

/* ===================== 配置 ===================== */
const CFG_KEY = 'voice-assistant-cfg-v3';
const cfg = Object.assign({
  gemkey: '', gkey: '', xaikey: '', xaiOn: false,
  tts: 'gemini', voice: 'Kore', chunk: 30, rate: 1.0, silence: 1.0,
}, JSON.parse(localStorage.getItem(CFG_KEY) || '{}'));

const GEM_MODEL = 'gemini-3.5-flash';
const TTS_MODEL = 'gemini-3.1-flash-tts-preview';
const GROK_MODEL = 'grok-4.3';

// 本地历史：持久化保存，平时给模型最近 20 条，要求"搜索记录"时给 50 条
const HIST_KEY = 'voice-assistant-history';
const CTX_NORMAL = 20, CTX_SEARCH = 50, STORE_MAX = 100;
const SEARCH_RE = /搜索记录|搜记录|查记录|查询记录|查一下记录|翻记录|翻一下记录|翻翻记录|找记录|找一下记录|历史记录|查历史|搜历史|聊天记录|回顾一下|回顾我们|回顾之前|之前我们|我们之前|之前聊过|之前说过|之前提到|之前讲过|上次说|上次聊|上次提到|前面提到|前面说过|前面讲过|早些时候说|你还记不记得|还记不记得|记不记得之前/;

const SYSTEM_PROMPT =
  '你是一个语音对话助手，用户通过语音和你交流，你的回答会被朗读出来。' +
  '规则：1) 用口语化的简体中文回答；2) 绝对不要使用 Markdown、列表符号、星号、标题、代码块等任何排版格式，只输出适合朗读的连贯自然语句；' +
  '3) 默认简洁，两三句话说清楚，用户追问再展开；4) 需要最新信息时你可以联网搜索，回答时直接说结论，不要罗列网址。' +
  '用户语音经过自动转录，可能有错别字或同音字，请按语境理解真实意图。';

const X_SYSTEM =
  '用户已经从主回答里得到了基本信息。现在请你专门补充 X（推特）上关于这个话题的实时讨论：' +
  '大家在聊什么、有什么最新动态、有代表性的观点或情绪倾向。' +
  '用口语化简体中文，两三句话，不要使用任何排版符号，不要罗列网址，不要重复主回答已经说过的内容。';

/* ===================== 状态 ===================== */
const S = { IDLE:'idle', LISTEN:'listen', RECORD:'record', THINK:'think', SPEAK:'speak' };
let state = S.IDLE, live = false;
let history = loadHistory();   // [{role:'user'|'assistant', text}]，从 localStorage 恢复
let mediaStream = null, audioCtx = null, analyser = null, vadTimer = null, micSource = null;
let recorder = null, chunks = [];
let voiceFrames = 0, bargeFrames = 0, silenceMs = 0, recStartTs = 0;
let probeRec = null, probeChunks = [], probing = false, probeBusy = false, probeSilence = 0, probeStartTs = 0;
let speakQueue = 0, streamDone = true, genId = 0, ttsChain = Promise.resolve(), curSource = null;
let thinkNodes = null;
let ttsUnlocked = false;
let abortCtrl = null, wakeLock = null;

const $ = id => document.getElementById(id);
const logEl = $('log'), statusEl = $('status'), btn = $('bigbtn'), vufill = $('vufill'), xBtn = $('xtoggle');

function setStatus(t){ statusEl.textContent = t; }
function addMsg(cls, text){
  const d = document.createElement('div');
  d.className = 'msg ' + cls; d.textContent = text;
  logEl.appendChild(d); logEl.scrollTop = logEl.scrollHeight;
  return d;
}

/* ===================== X 推特补充开关 ===================== */
function refreshXUI(){
  const on = cfg.xaiOn && !!cfg.xaikey;
  xBtn.textContent = on ? '＋X 开' : '＋X 关';
  xBtn.classList.toggle('on', on);
}
function toggleXai(on, spoken){
  if (on && !cfg.xaikey){
    addMsg('sys', '还没填 xAI 密钥，无法开启 X 补充');
    if (spoken) speak('还没有设置 X 的密钥，请先在设置里填入');
    return;
  }
  cfg.xaiOn = on;
  localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
  refreshXUI();
  addMsg('sys', on ? '已开启 X 推特补充' : '已关闭 X 推特补充');
  if (spoken) speak(on ? '好的，回答后会加上推特讨论' : '好的，已关闭推特补充');
}
xBtn.onclick = () => toggleXai(!(cfg.xaiOn && cfg.xaikey), false);

/* 语音命令：返回 true 表示已作为命令处理（不再送大模型） */
function handleCommand(text){
  const t = text.toLowerCase().replace(/\s|，|。|！|、/g, '');
  const mentionsX = /推特|twitter|x上|grok|格罗克|外网/.test(t);
  if (!mentionsX) return false;
  const open = /(打开|开启|启用|加上|带上|要看|看看)/.test(t);
  const close = /(关闭|关掉|取消|不要|别看|去掉|停用)/.test(t);
  if (close){ toggleXai(false, true); return true; }
  if (open){ toggleXai(true, true); return true; }
  return false;
}

/* ===================== 音频上下文 ===================== */
async function ensureAudio(){
  if (!audioCtx || audioCtx.state === 'closed') audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
}
let micAcquire = null;   // 在途获取 Promise，并发调用复用同一个，避免多次 getUserMedia
function acquireMic(){
  if (mediaStream) return Promise.resolve(true);
  if (micAcquire) return micAcquire;
  micAcquire = (async () => {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
      });
    } catch(e){ addMsg('sys', '无法访问麦克风：'+e.message); micAcquire = null; return false; }
    micSource = audioCtx.createMediaStreamSource(mediaStream);
    analyser = audioCtx.createAnalyser(); analyser.fftSize = 1024;
    micSource.connect(analyser);
    micAcquire = null;
    return true;
  })();
  return micAcquire;
}
function releaseMic(){
  if (micSource){ try { micSource.disconnect(); } catch(e){} micSource = null; }   // 断开旧节点，避免本地模式每轮累积
  if (mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream = null; }
  analyser = null;
}

/* ===================== 会话开关 ===================== */
btn.onclick = async () => {
  if (!live){
    if (!cfg.gemkey || !cfg.gkey){ $('gear').onclick(); addMsg('sys','请先在设置里填入 Gemini 和 Groq 两个 Key'); return; }
    await startSession();
  } else stopSession();
};
function unlockTTS(){
  if (ttsUnlocked || !('speechSynthesis' in window)) return;   // iOS 须在用户手势内先 speak 一次才允许后续本地语音
  try { speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(' '); u.volume = 0; speechSynthesis.speak(u); ttsUnlocked = true; } catch(e){}
}
async function startSession(){
  await ensureAudio();
  unlockTTS();
  if (!(await acquireMic())) return;
  if ('wakeLock' in navigator){ try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }
  live = true;
  btn.classList.add('live'); btn.textContent = '⏹';
  addMsg('sys', '对话开始，直接说话即可。朗读时说"谢谢"可打断，也可点屏幕或按耳机/眼镜的暂停键');
  enterListening();
  vadTimer = setInterval(vadTick, 50);
}
function stopSession(){
  live = false;
  clearInterval(vadTimer); vadTimer = null;
  stopPlayback(); stopRecorder(true); releaseMic();
  if (wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; }
  state = S.IDLE;
  btn.classList.remove('live'); btn.textContent = '🎙';
  vufill.style.width = '0%';
  setStatus('点击开始对话');
  addMsg('sys', '对话结束');
}

/* ===================== VAD ===================== */
const VAD_START = 0.022, VAD_KEEP = 0.012, VAD_BARGE = 0.05, MIN_SPEECH_MS = 350;
function rms(){
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  let s = 0; for (let i=0;i<buf.length;i++) s += buf[i]*buf[i];
  return Math.sqrt(s/buf.length);
}
function vadTick(){
  if (!live || !analyser) return;
  const level = rms();
  vufill.style.width = Math.min(100, level*900) + '%';
  if (probeBusy) return;
  if (probing){
    if (level > VAD_KEEP) probeSilence = 0;
    else { probeSilence += 50; if (probeSilence >= cfg.silence*1000) finishProbe(); }
    return;
  }
  if (state === S.LISTEN){
    if (level > VAD_START){ if (++voiceFrames >= 2) startRecorder(); } else voiceFrames = 0;
  } else if (state === S.RECORD){
    if (level > VAD_KEEP) silenceMs = 0;
    else { silenceMs += 50; if (silenceMs >= cfg.silence*1000) finishRecording(); }
  } else if (state === S.SPEAK){
    // 朗读时不再一有声音就打断：先把这段话录下来，转录后只有含"谢谢"才停止
    if (level > VAD_BARGE){ if (++bargeFrames >= 4) startProbe(); } else bargeFrames = 0;
  }
}
async function enterListening(){
  stopThinking();
  if (!live) return;
  if (!mediaStream){                      // 本地语音模式朗读时释放过麦克风，这里重新获取
    setStatus('…');
    if (!(await acquireMic())){ stopSession(); return; }
    if (!live){ releaseMic(); return; }
  }
  state = S.LISTEN; voiceFrames = 0; bargeFrames = 0;
  setStatus('🟢 聆听中…说话即可');
}

/* ===================== 录音 ===================== */
function pickMime(){
  for (const m of ['audio/mp4','audio/webm;codecs=opus','audio/webm']) if (MediaRecorder.isTypeSupported(m)) return m;
  return '';
}
function startRecorder(){
  if (!mediaStream) return;
  chunks = [];
  const mime = pickMime();
  recorder = new MediaRecorder(mediaStream, mime ? {mimeType:mime} : {});
  recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  recorder.start(); recStartTs = Date.now(); silenceMs = 0;
  state = S.RECORD; setStatus('🔴 正在听你说…');
}
function stopRecorder(discard){
  if (recorder && recorder.state !== 'inactive'){ if (discard) recorder.ondataavailable = null; try{recorder.stop()}catch(e){} }
  recorder = null;
}
function finishRecording(){
  const dur = Date.now() - recStartTs;
  const mime = recorder ? recorder.mimeType : 'audio/mp4';
  if (dur < MIN_SPEECH_MS){ stopRecorder(true); enterListening(); return; }
  state = S.THINK; setStatus('⏳ 转录中…');
  startThinking();                       // 转录+思考期间放等待音
  const rec = recorder; recorder = null;
  rec.onstop = () => { const blob = new Blob(chunks, {type:mime}); chunks = []; transcribeAndAsk(blob, mime); };
  rec.stop();
}
/* 朗读中：录下用户这段话作为"是否说了谢谢"的候选，期间不打断朗读 */
function startProbe(){
  if (!mediaStream || state !== S.SPEAK) return;
  probeChunks = [];
  const mime = pickMime();
  probeRec = new MediaRecorder(mediaStream, mime ? {mimeType:mime} : {});
  probeRec.ondataavailable = e => { if (e.data.size) probeChunks.push(e.data); };
  probeRec.start(); probeStartTs = Date.now(); probeSilence = 0; probing = true;
}
async function finishProbe(){
  probing = false; probeBusy = true; bargeFrames = 0;
  const dur = Date.now() - probeStartTs;
  const mime = probeRec ? probeRec.mimeType : 'audio/mp4';
  const rec = probeRec; probeRec = null;
  await new Promise(res => { rec.onstop = res; try { rec.stop(); } catch(e){ res(); } });
  const blob = new Blob(probeChunks, {type:mime}); probeChunks = [];
  if (dur < MIN_SPEECH_MS){ probeBusy = false; return; }   // 太短，忽略
  let text = '';
  try { text = await transcribe(blob, mime); } catch(e){ text = ''; }
  const norm = text.replace(/\s/g, '');
  const isThanks = /谢谢|謝謝|thankyou|thanks/i.test(norm);
  if (isThanks){
    stopPlayback();
    const after = text.replace(/^[\s\S]*?(?:谢谢|謝謝)(?:[\s,，。.!！、:：…]*(?:谢谢|謝謝))*[\s,，。.!！、:：…]*/, '').trim();
    if (after.length >= 2){ addMsg('user', after); probeBusy = false; await ask(after); return; }
    addMsg('sys', '（听到"谢谢"，已停止，请说你的问题）');
    probeBusy = false; await enterListening(); return;
  }
  // 不是"谢谢"：忽略这段插话，继续
  probeBusy = false;
  if (state !== S.SPEAK && live && speakQueue === 0) await enterListening();
}

/* ===================== 转录（Groq Whisper） ===================== */
async function transcribe(blob, mime){
  const ext = mime.includes('mp4') ? 'm4a' : 'webm';
  const fd = new FormData();
  fd.append('file', blob, 'audio.'+ext);
  fd.append('model', 'whisper-large-v3-turbo');
  const r = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
    method:'POST', headers:{Authorization:'Bearer '+cfg.gkey}, body: fd
  });
  if (!r.ok) throw new Error('Groq '+r.status+' '+(await r.text()).slice(0,120));
  return (await r.json()).text.trim();
}
async function transcribeAndAsk(blob, mime){
  let text = '';
  try { text = await transcribe(blob, mime); }
  catch(e){ addMsg('sys','转录失败：'+e.message); if (live) enterListening(); return; }
  if (!text || text.length < 2){ if (live) enterListening(); return; }
  if (handleCommand(text)){ addMsg('user', text); return; }
  addMsg('user', text);
  await ask(text);
}

/* ===================== 主流程：Gemini 答 → 可选 Grok 追加 X 讨论 ===================== */
/* ===================== 本地历史持久化 ===================== */
function loadHistory(){
  try {
    const arr = JSON.parse(localStorage.getItem(HIST_KEY) || '[]');
    if (!Array.isArray(arr)) return [];
    const out = [];
    for (const m of arr){
      if (!m || (m.role !== 'user' && m.role !== 'assistant') || typeof m.text !== 'string') continue;
      if (out.length && out[out.length-1].role === m.role) continue;   // 跳过连续同角色，保证交替
      out.push({ role: m.role, text: m.text });
    }
    return out;
  } catch(e){ return []; }
}
function updateMemCount(){ const el = $('memcount'); if (el) el.textContent = '(' + history.length + ')'; }
function saveHistory(){
  if (history.length > STORE_MAX) history.splice(0, history.length - STORE_MAX);   // 原地裁剪，保持引用不变
  try { localStorage.setItem(HIST_KEY, JSON.stringify(history)); }
  catch(e){
    // 配额满：只尝试存裁剪版本，绝不改动内存里的 history
    try { localStorage.setItem(HIST_KEY, JSON.stringify(history.slice(-CTX_SEARCH))); } catch(e2){}
  }
  updateMemCount();
  if ($('memlist') && $('memlist').style.display !== 'none') renderMemList();
}
function clearHistory(){
  stopPlayback();                                  // 中断在途流式/播放，作废当前轮
  if (live) enterListening(); else { state = S.IDLE; setStatus('点击开始对话'); }
  history.length = 0;                              // 原地清空，保持引用
  try { localStorage.removeItem(HIST_KEY); } catch(e){}
  logEl.innerHTML = '';
  addMsg('sys', '已清空对话记录');
  updateMemCount();
}
function isSearchQuery(t){ return SEARCH_RE.test(t); }
/* 设置里查看 / 清空全部本地记录 */
function renderMemList(){
  const box = $('memlist');
  const snap = history.slice();                   // 快照，避免渲染期间被改
  updateMemCount();
  if (!snap.length){ box.innerHTML = '<span style="color:var(--dim)">（暂无记录）</span>'; return; }
  box.innerHTML = '';
  for (const m of snap){
    const row = document.createElement('div');
    row.style.margin = '4px 0';
    row.innerHTML = '<b style="color:' + (m.role==='user'?'#4f8cff':'#8a8b92') + '">' + (m.role==='user'?'我':'助手') + '：</b>';
    row.appendChild(document.createTextNode(m.text));
    box.appendChild(row);
  }
}
$('viewmem').onclick = () => {
  const box = $('memlist');
  if (box.style.display === 'none'){ renderMemList(); box.style.display = 'block'; }
  else box.style.display = 'none';
};
$('clearmem').onclick = () => {
  if (!history.length){ addMsg('sys','没有可清空的记录'); return; }
  clearHistory(); renderMemList();
};
/* 启动时把已保存的历史渲染到对话区，保持连贯 */
function renderHistoryOnLoad(){
  if (!history.length) return;
  const recent = history.slice(-8);
  addMsg('sys', '已恢复历史对话（共 ' + history.length + ' 条，显示最近 ' + recent.length + ' 条）');
  for (const m of recent) addMsg(m.role === 'assistant' ? 'ai' : 'user', m.text);
}
/* 取给模型的上下文：交替对齐、去掉开头多余的 assistant，确保以 user 开头 */
function buildContext(searching){
  let ctx = history.slice(-(searching ? CTX_SEARCH : CTX_NORMAL));
  while (ctx.length && ctx[0].role === 'assistant') ctx = ctx.slice(1);          // 去开头多余 assistant
  while (ctx.length && ctx[ctx.length-1].role === 'assistant') ctx = ctx.slice(0,-1); // 去尾部多余 assistant
  return ctx;
}

async function ask(userText){
  stopPlayback();          // 清空上一轮残留的 speakQueue / ttsChain / 在途请求，杜绝泄漏
  state = S.THINK; setStatus('🤔 思考中…');
  startThinking();
  // 清掉上一轮被打断、没有应答的悬空 user 消息，避免出现连续 user
  if (history.length && history[history.length-1].role === 'user') history.pop();
  const userMsg = { role:'user', text:userText };
  history.push(userMsg);
  const searching = isSearchQuery(userText);
  if (searching) addMsg('sys', '🔎 搜索记录模式：回看最近 ' + CTX_SEARCH + ' 条对话');
  const ctx = buildContext(searching);

  streamDone = false; genId++; const myGen = genId;
  abortCtrl = new AbortController();
  let assistantPushed = false;

  try {
    // —— 第一段：Gemini + 谷歌搜索 ——
    const aiDiv = addMsg('ai', '');
    let full = '', sb = '';
    await streamGemini(ctx, t => {
      if (genId !== myGen) return;
      full += t; sb += t; aiDiv.textContent = full; logEl.scrollTop = logEl.scrollHeight;
      sb = flushSentences(sb, false);
    }, myGen);
    if (genId !== myGen) return;
    flushSentences(sb, true);
    if (full.trim()){ history.push({ role:'assistant', text: full }); assistantPushed = true; }

    // —— 第二段：Grok 追加 X(推特) 实时讨论 ——
    if (cfg.xaiOn && cfg.xaikey && genId === myGen){
      setStatus('🐦 查 X 上的讨论…');
      const xPrefix = '📱 X 上的讨论\n';
      const xDiv = addMsg('ai x', xPrefix);
      let xfull = '', xsb = '';
      try {
        await streamGrokX(userText, full, t => {
          if (genId !== myGen) return;
          xfull += t; xsb += t; xDiv.textContent = xPrefix + xfull; logEl.scrollTop = logEl.scrollHeight;
          xsb = flushSentences(xsb, false);
        }, myGen);
        if (genId === myGen){ flushSentences(xsb, true); if (!xfull.trim()) xDiv.remove(); }
      } catch(e){
        if (e.name !== 'AbortError') xDiv.textContent = '（X 补充失败：'+e.message+'）';
      }
    }

    streamDone = true;
    if (genId === myGen && speakQueue === 0) backToIdleOrListen();
  } catch(e){
    streamDone = true;
    if (e.name !== 'AbortError'){ addMsg('sys','出错：'+e.message); }
    if (genId === myGen && speakQueue === 0) backToIdleOrListen();
  } finally {
    // 未应答（出错或被打断）则移除这条 user，保持历史干净
    if (!assistantPushed && history[history.length-1] === userMsg) history.pop();
    saveHistory();
    if (genId === myGen) abortCtrl = null;
  }
}
function backToIdleOrListen(){
  stopThinking();
  if (live) enterListening();
  else { state = S.IDLE; setStatus('点击开始对话'); }
}

/* 通用 SSE 读取；alive() 返回 false 时主动停止读取（被打断时省带宽） */
async function readSSE(resp, onObj, alive){
  const reader = resp.body.getReader(); const dec = new TextDecoder(); let buf = '';
  while (true){
    if (alive && !alive()){ try { reader.cancel(); } catch(e){} return; }
    const { done, value } = await reader.read(); if (done) break;
    buf += dec.decode(value, {stream:true});
    const lines = buf.split('\n'); buf = lines.pop();
    for (const line of lines){
      const s = line.trim();
      if (!s.startsWith('data:')) continue;
      const payload = s.slice(5).trim();
      if (payload === '[DONE]') return;
      let obj; try { obj = JSON.parse(payload); } catch(e){ continue; }
      onObj(obj);
    }
  }
}
async function streamGemini(ctx, onText, myGen){
  const contents = ctx.map(m => ({ role: m.role === 'assistant' ? 'model' : 'user', parts:[{text:m.text}] }));
  const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEM_MODEL}:streamGenerateContent?alt=sse&key=${cfg.gemkey}`, {
    method:'POST', signal: abortCtrl.signal, headers:{'content-type':'application/json'},
    body: JSON.stringify({
      system_instruction:{ parts:[{text: SYSTEM_PROMPT}] },
      contents, tools:[{ google_search:{} }]
    })
  });
  if (!r.ok) throw new Error('Gemini '+r.status+' '+(await r.text()).slice(0,200));
  await readSSE(r, obj => {
    const parts = obj.candidates && obj.candidates[0] && obj.candidates[0].content && obj.candidates[0].content.parts;
    if (parts) for (const p of parts) if (p.text) onText(p.text);
  }, () => genId === myGen);
}
async function streamGrokX(topic, mainAnswer, onText, myGen){
  const messages = [
    { role:'system', content: X_SYSTEM },
    { role:'user', content: `话题：${topic}\n（主回答已经讲过：${mainAnswer.slice(0,400)}）\n请补充 X 上关于这个话题的最新讨论。` }
  ];
  const r = await fetch('https://api.x.ai/v1/chat/completions', {
    method:'POST', signal: abortCtrl.signal,
    headers:{ Authorization:'Bearer '+cfg.xaikey, 'content-type':'application/json' },
    body: JSON.stringify({
      model: GROK_MODEL, messages, stream: true,
      search_parameters:{ mode:'on', sources:[{ type:'x' }], max_search_results: 20 }
    })
  });
  if (!r.ok) throw new Error('Grok '+r.status+' '+(await r.text()).slice(0,200));
  await readSSE(r, obj => {
    const d = obj.choices && obj.choices[0] && obj.choices[0].delta;
    if (d && d.content) onText(d.content);
  }, () => genId === myGen);
}

/* 找到断句位置：优先在句末标点处断且段长≥分段长度；缓冲足够长仍无句末时退而在逗号断，
   避免一直等下去。分段长度由设置 cfg.chunk 控制（大段更顺、小段更快）。 */
function nextBreak(s){
  const min = cfg.chunk || 30;
  for (let i = 0; i < s.length; i++){
    if ('。！？!?\n'.indexOf(s[i]) >= 0 && i + 1 >= min) return i + 1;   // 句末断
  }
  if (s.length >= min * 1.8){                                          // 太长没句末 → 逗号断
    for (let i = min; i < s.length; i++){
      if ('；;，,、'.indexOf(s[i]) >= 0) return i + 1;
    }
    return Math.floor(min * 1.8);                                       // 连逗号都没有 → 强制断，避免卡住不出声
  }
  return -1;
}
const stripX = s => s.replace(/^📱 X 上的讨论\s*/, '');
/* 把缓冲里够长的整段送去朗读，返回剩余未完结部分 */
function flushSentences(buf, flushAll){
  if (flushAll){ const t = stripX(buf.trim()); if (t) speak(t); return ''; }
  let rest = buf;
  for (;;){
    const idx = nextBreak(rest);
    if (idx < 0) break;
    const seg = stripX(rest.slice(0, idx).trim());
    if (seg) speak(seg);
    rest = rest.slice(idx);
  }
  return rest;
}

/* ===================== 等待音（思考时的柔和波浪声） ===================== */
function startThinking(){
  if (!audioCtx || audioCtx.state === 'closed' || thinkNodes) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const ctx = audioCtx, t0 = ctx.currentTime;
  const len = Math.floor(ctx.sampleRate * 2);
  const nb = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = nb.getChannelData(0);
  let last = 0;
  for (let i = 0; i < len; i++){ const w = Math.random()*2-1; last = (last + 0.02*w)/1.02; d[i] = last*3.2; } // 棕噪声
  const noise = ctx.createBufferSource(); noise.buffer = nb; noise.loop = true;
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 480; bp.Q.value = 0.8;
  const gain = ctx.createGain(); gain.gain.value = 0.0001;
  const lfo = ctx.createOscillator(); lfo.frequency.value = 0.5;                   // 慢速起伏
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.06;
  lfo.connect(lfoGain); lfoGain.connect(gain.gain);
  noise.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(0.13, t0 + 0.4);                          // 渐入，音量更明显
  noise.start(); lfo.start();
  thinkNodes = { noise, lfo, gain, lfoGain };
}
function stopThinking(){
  if (!thinkNodes) return;
  const { noise, lfo, gain, lfoGain } = thinkNodes; thinkNodes = null;
  try {
    const t = audioCtx.currentTime;
    lfoGain.gain.setValueAtTime(0, t);
    gain.gain.cancelScheduledValues(t);
    gain.gain.setValueAtTime(Math.max(gain.gain.value, 0.0001), t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);                      // 渐出
  } catch(e){}
  setTimeout(() => { try { noise.stop(); } catch(e){} try { lfo.stop(); } catch(e){} }, 250);
}

/* ===================== 朗读（Gemini TTS → Web Audio） ===================== */
function pcmToBuffer(base64, sampleRate){
  const bin = atob(base64), n = bin.length, bytes = new Uint8Array(n);
  for (let i=0;i<n;i++) bytes[i] = bin.charCodeAt(i);
  const view = new DataView(bytes.buffer), samples = Math.floor(n/2);
  const ab = audioCtx.createBuffer(1, samples, sampleRate), ch = ab.getChannelData(0);
  for (let i=0;i<samples;i++) ch[i] = view.getInt16(i*2, true) / 32768;
  return ab;
}
async function synthTTS(text){
  const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent?key=${cfg.gemkey}`, {
    method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({
      contents:[{ parts:[{text}] }],
      generationConfig:{ responseModalities:['AUDIO'], speechConfig:{ voiceConfig:{ prebuiltVoiceConfig:{ voiceName: cfg.voice } } } }
    })
  });
  if (!r.ok) throw new Error('TTS '+r.status);
  const j = await r.json();
  const parts = (j.candidates && j.candidates[0] && j.candidates[0].content && j.candidates[0].content.parts) || [];
  const part = parts.find(p => p.inlineData);
  if (!part) throw new Error('TTS 无音频');
  const rate = parseInt((part.inlineData.mimeType.match(/rate=(\d+)/)||[])[1]) || 24000;
  return pcmToBuffer(part.inlineData.data, rate);
}
function speak(text){
  if (!text) return;
  if (cfg.tts === 'local') return speakLocal(text);
  // —— Gemini TTS（Web Audio，麦克风可同时开 → 支持"谢谢"打断）——
  const myGen = genId;
  if (live || state !== S.IDLE){ state = S.SPEAK; setStatus('🔊 朗读中…说话即可打断'); }
  speakQueue++;
  const fetched = synthTTS(text).catch(e => { console.warn('TTS失败', e); return null; });
  ttsChain = ttsChain.then(async () => {
    if (genId !== myGen) return;                       // 被打断/换轮：speakQueue 已由 stopPlayback 清零
    const buf = await fetched;
    if (genId !== myGen) return;
    if (buf) await playBuffer(buf, myGen);
    speakQueue--;
    if (speakQueue <= 0 && streamDone) backToIdleOrListen();
  });
}
/* iPhone 本地语音：零网络延迟更顺，但 iOS 占麦克风时会静音 → 朗读时释放麦克风（朗读中只能点屏幕打断） */
let localVoices = [];
function refreshLocalVoices(){ try { localVoices = speechSynthesis.getVoices() || []; } catch(e){ localVoices = []; } }
function pickLocalVoice(lang){
  if (!localVoices.length) refreshLocalVoices();
  const vs = localVoices;
  if (!vs.length) return null;
  if (/^zh/i.test(lang)){
    return vs.find(v => /^zh[-_]CN/i.test(v.lang) && /Siri|增强|Enhanced|Premium/i.test(v.name))
        || vs.find(v => /^zh[-_]CN/i.test(v.lang)) || vs.find(v => /^zh/i.test(v.lang)) || null;
  }
  return vs.find(v => /^en[-_]US/i.test(v.lang)) || null;
}
function speakLocal(text){
  const myGen = genId;
  stopThinking();                                     // 进入本地朗读即停等待音（覆盖所有路径）
  if (live || state !== S.IDLE){
    if (live && mediaStream) releaseMic();            // 释放麦克风（幂等），避免 iOS 把本地语音静音
    state = S.SPEAK; setStatus('🔊 朗读中…点屏幕打断');
  }
  speakQueue++;
  const u = new SpeechSynthesisUtterance(text);
  const isZh = /[一-鿿]/.test(text);
  u.lang = isZh ? 'zh-CN' : 'en-US';
  const v = pickLocalVoice(u.lang); if (v) u.voice = v;
  u.rate = cfg.rate;
  let done = false;
  const finish = () => {                              // 去重：onend/onerror 与 catch 只生效一次
    if (done || genId !== myGen) return;
    done = true; speakQueue--;
    if (speakQueue <= 0 && streamDone) backToIdleOrListen();
  };
  u.onend = u.onerror = finish;
  try { speechSynthesis.speak(u); } catch(e){ finish(); }
}
function playBuffer(buf, myGen){
  return new Promise(res => {
    if (genId !== myGen){ res(); return; }
    stopThinking();                       // 第一段真实语音开始播 → 停掉等待音
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.playbackRate.value = cfg.rate;
    src.connect(audioCtx.destination);
    curSource = src;
    src.onended = () => { if (curSource === src) curSource = null; res(); };
    try { src.start(); } catch(e){ res(); }
  });
}
function cleanupProbe(){
  probing = false; probeBusy = false; probeSilence = 0; bargeFrames = 0;
  if (probeRec && probeRec.state !== 'inactive'){ probeRec.ondataavailable = null; try { probeRec.stop(); } catch(e){} }
  probeRec = null; probeChunks = [];
}
function stopPlayback(){
  genId++;
  ttsChain = Promise.resolve();
  speakQueue = 0; streamDone = true;
  stopThinking();
  cleanupProbe();
  try { speechSynthesis.cancel(); } catch(e){}        // 取消本地语音队列
  if (curSource){ try { curSource.stop(); } catch(e){} curSource = null; }
  if (abortCtrl){ try { abortCtrl.abort(); } catch(e){} }
}

/* ===================== 文字输入 ===================== */
async function sendTyped(){
  const t = $('textin').value.trim();
  if (!t) return;
  if (!cfg.gemkey){ $('gear').onclick(); addMsg('sys','请先在设置里填入 Gemini Key'); return; }
  if (state === S.THINK) return;
  await ensureAudio();
  unlockTTS();
  if (state === S.SPEAK) stopPlayback();
  if (state === S.RECORD){ stopRecorder(true); if (live) enterListening(); }
  $('textin').value = ''; $('textin').blur();
  if (handleCommand(t)){ addMsg('user', t); return; }
  addMsg('user', t);
  await ask(t);
}
$('sendbtn').onclick = sendTyped;
$('textin').addEventListener('keydown', e => { if (e.key === 'Enter') sendTyped(); });

/* 朗读时点屏幕也可打断 */
document.body.addEventListener('click', e => {
  if (state !== S.SPEAK) return;
  if (e.target.closest('#panel') || e.target.closest('header') || e.target === btn || e.target.closest('#textrow')) return;
  stopPlayback(); backToIdleOrListen();
});

/* wake lock 重申请 */
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && live && 'wakeLock' in navigator){
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
  }
});

/* 外设暂停键（蓝牙耳机 / Meta 眼镜侧键 / 键盘媒体键）→ 打断朗读 */
function externalStop(){
  if (state === S.SPEAK || speakQueue > 0){ stopPlayback(); backToIdleOrListen(); return true; }
  return false;
}
if ('mediaSession' in navigator){
  try { navigator.mediaSession.metadata = new MediaMetadata({ title:'语音助手', artist:'对话中' }); } catch(e){}
  for (const a of ['pause','stop']){ try { navigator.mediaSession.setActionHandler(a, externalStop); } catch(e){} }
  try { navigator.mediaSession.setActionHandler('play', () => { if (live) enterListening(); }); } catch(e){}
}
document.addEventListener('keydown', e => {
  if (e.key === 'MediaPlayPause' || e.key === 'MediaStop' || e.code === 'MediaPlayPause'){ externalStop(); }
});

refreshXUI();
updateMemCount();
renderHistoryOnLoad();
if ('speechSynthesis' in window){ try { refreshLocalVoices(); speechSynthesis.onvoiceschanged = refreshLocalVoices; } catch(e){} }   // 预热并缓存本地语音列表
if ('serviceWorker' in navigator){ window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{})); }   // PWA：秒开+离线外壳
</script>
